name: Mise à jour quotidienne des données

on:
  # Tous les jours à 19h00 heure de Paris (17h00 UTC en hiver, 18h00 UTC en été)
  # On utilise 18h00 UTC pour couvrir toute l'année après la clôture de la bourse européenne (17h30)
  schedule:
    - cron: '0 18 * * 1-5'  # Du lundi au vendredi à 18h UTC
  # Permet de lancer manuellement depuis l'onglet Actions
  workflow_dispatch:

# Autorisations nécessaires pour commiter
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Installation des dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Exécution du scraper
        run: |
          python run.py
      
      - name: Commit des données mises à jour
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/latest.json
          
          # Ne commit que si quelque chose a changé
          if git diff --staged --quiet; then
            echo "Pas de changement, rien à commiter"
          else
            git commit -m "📊 Mise à jour données $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
